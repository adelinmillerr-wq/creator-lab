<html lang="ru">

<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@1,400;1,600&family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-base:#08080f; --bg-mid:#0f0f20; --bg-card:#0d0d1a; --bg-card2:#0d0d1c;
    --bg-border:#1a1a2e; --bg-muted:#4a4a6a;
    --text-primary:#e8e8f2; --text-secondary:#8888b0; --text-muted:#4a4a6a;
    --pink:#f093fb; --coral:#f5576c; --gold:#e8c97d; --cyan:#12c2e9; --violet:#c471f5;
    --grad-main:linear-gradient(135deg,#f093fb,#f5576c);
    --grad-moonlight:linear-gradient(135deg,#c471f5,#12c2e9);
    --grad-gold:linear-gradient(135deg,#e8c97d,#f093fb);
    --glow-pink:0 0 32px rgba(240,147,251,0.18);
    --glow-gold:0 0 32px rgba(232,201,125,0.20);
    --glow-cyan:0 0 32px rgba(18,194,233,0.15);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg-base);color:var(--text-primary);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;justify-content:center;-webkit-font-smoothing:antialiased;}
  .app{width:100%;max-width:440px;min-height:100vh;position:relative;overflow-x:hidden;}
  .ambient{position:fixed;top:-90px;left:50%;transform:translateX(-50%);width:720px;height:520px;border-radius:50%;pointer-events:none;z-index:0;transition:background .8s ease;}
  .screen{position:relative;z-index:1;animation:fade .35s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  /* HERO */
  .hero{padding:38px 20px 20px;}
  .brand-badge{display:inline-flex;align-items:center;gap:7px;background:#12121f;border:1px solid #2a2a42;border-radius:999px;padding:5px 13px;margin-bottom:20px;}
  .brand-dot{width:6px;height:6px;border-radius:50%;background:var(--grad-main);animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
  .brand-text{font-size:11px;color:#777;letter-spacing:.07em;text-transform:uppercase;}
  .logo-main{font-family:'Bebas Neue',sans-serif;font-size:50px;letter-spacing:.04em;line-height:1;background:linear-gradient(135deg,#fff 38%,#9a9ac0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .logo-line2{display:flex;align-items:baseline;gap:10px;margin-top:-9px;}
  .logo-by{font-family:'Bebas Neue',sans-serif;font-size:16px;color:#3a3a55;letter-spacing:.15em;padding-bottom:4px;}
  .logo-adelin{font-family:'Bebas Neue',sans-serif;font-size:50px;letter-spacing:.04em;line-height:1;background:var(--grad-main);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .tagline{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:19px;color:#a9a9cc;margin-top:10px;line-height:1.4;}

  /* INTRO */
  .intro{margin:18px 20px 0;background:var(--bg-card2);border:1px solid var(--bg-border);border-radius:20px;padding:20px;position:relative;overflow:hidden;}
  .intro::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--grad-main);}
  .intro-tag{display:inline-block;background:linear-gradient(135deg,#f093fb22,#f5576c22);border:1px solid #f093fb44;border-radius:999px;padding:4px 12px;font-size:10px;color:var(--pink);letter-spacing:.12em;text-transform:uppercase;margin-bottom:14px;}
  .intro-title{font-family:'Bebas Neue',sans-serif;font-size:23px;letter-spacing:.02em;line-height:1.15;margin-bottom:12px;}
  .intro-title span{background:var(--grad-main);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .intro-item{font-size:13.5px;color:#8d8db2;padding:8px 0;line-height:1.5;border-bottom:1px solid #14141f;}
  .intro-item:last-of-type{border-bottom:none;}
  .intro-item b{color:#d4d4ec;font-weight:600;}
  .intro-foot{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:16px;color:var(--pink);margin-top:14px;line-height:1.5;}

  /* SEARCH */
  .search-wrap{padding:22px 20px 4px;position:relative;}
  .search-box{display:flex;align-items:center;gap:10px;background:var(--bg-card);border:1px solid var(--bg-border);border-radius:14px;padding:13px 16px;transition:border-color .2s,box-shadow .2s;}
  .search-box:focus-within{border-color:#33335a;box-shadow:var(--glow-pink);}
  .search-box input{flex:1;background:none;border:none;outline:none;color:var(--text-primary);font-family:inherit;font-size:14px;}
  .search-box input::placeholder{color:var(--text-muted);}
  .search-ico{font-size:15px;opacity:.6;}
  .search-clear{color:var(--text-muted);font-size:18px;cursor:pointer;display:none;background:none;border:none;padding:0 2px;}

  /* SECTION LABEL */
  .section-label{color:#55557a;font-size:11px;letter-spacing:.12em;text-transform:uppercase;margin:26px 0 13px;padding:0 20px;font-weight:600;}
  .section-label.first{margin-top:18px;}

  /* START CARD */
  .start-card{margin:14px 20px 0;display:flex;align-items:center;gap:14px;background:linear-gradient(135deg,#15101f,#0e1420);border:1px solid #2a2348;border-radius:20px;padding:16px 18px;cursor:pointer;text-decoration:none;transition:transform .15s,border-color .2s;-webkit-tap-highlight-color:transparent;}
  .start-card:active{transform:scale(.98);}
  .start-ico{width:46px;height:46px;border-radius:14px;background:var(--grad-moonlight);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;box-shadow:var(--glow-cyan);}
  .start-txt b{display:block;font-size:14.5px;color:#eaeaff;font-weight:700;}
  .start-txt span{display:block;font-size:12px;color:#7a7aa0;margin-top:2px;}
  .start-arrow{margin-left:auto;color:#3a3a5a;font-size:20px;}

  /* WIDE BTN */
  .wide-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px 20px 0;}
  .wide-btn{display:flex;flex-direction:column;gap:6px;background:var(--bg-card);border:1px solid var(--bg-border);border-radius:16px;padding:15px 16px;text-decoration:none;cursor:pointer;transition:transform .15s,border-color .2s;-webkit-tap-highlight-color:transparent;}
  .wide-btn:active{transform:scale(.97);}
  .wide-btn .em{font-size:20px;}
  .wide-btn b{font-size:13.5px;color:#dadaf0;font-weight:600;}
  .wide-btn span{font-size:11px;color:#62628a;}

  /* GRID */
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 20px;}
  .cat-card{background:var(--bg-card);border:1px solid #161626;border-radius:20px;padding:17px 15px 15px;text-align:left;cursor:pointer;position:relative;overflow:hidden;transition:border-color .2s,transform .15s;-webkit-tap-highlight-color:transparent;display:flex;flex-direction:column;}
  .cat-card:active{transform:scale(.96);}
  .cat-shine{position:absolute;top:0;left:0;right:0;height:2px;border-radius:20px 20px 0 0;}
  .cat-emoji{font-size:25px;margin-bottom:9px;display:block;}
  .cat-title{font-weight:700;font-size:13.5px;color:#dde0ff;line-height:1.25;}
  .cat-sub{font-size:11px;color:#4d4d72;margin-top:3px;flex:1;}
  .cat-foot{display:flex;align-items:center;gap:6px;margin-top:11px;}
  .cat-count{font-size:10px;color:#46466a;letter-spacing:.04em;}
  .cat-dot{width:4px;height:4px;border-radius:50%;background:#2a2a42;}
  .cat-soon{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--cyan);border:1px solid rgba(18,194,233,.3);border-radius:20px;padding:2px 7px;}
  .cat-wide{grid-column:1/-1;}

  /* BOTTOM */
  .bottom{padding:8px 20px 42px;}
  .reviews-cta{display:flex;align-items:center;gap:14px;background:linear-gradient(135deg,#1a1208,#241a0c);border:1px solid rgba(232,201,125,.28);border-radius:18px;padding:16px 18px;text-decoration:none;cursor:pointer;transition:transform .15s,border-color .2s;margin-bottom:10px;-webkit-tap-highlight-color:transparent;}
  .reviews-cta:active{transform:scale(.98);}
  .reviews-cta .em{width:44px;height:44px;border-radius:13px;background:var(--grad-gold);display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0;box-shadow:var(--glow-gold);}
  .reviews-cta b{display:block;font-size:14px;color:var(--gold);font-weight:700;}
  .reviews-cta span{display:block;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:14px;color:#bba76a;margin-top:1px;}
  .reviews-cta .ar{margin-left:auto;color:#6a5e3a;font-size:20px;}

  .buy-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:17px;border-radius:16px;font-family:inherit;font-size:15.5px;font-weight:700;color:#fff;text-decoration:none;cursor:pointer;background:var(--grad-main);border:none;margin-bottom:10px;transition:opacity .2s,transform .15s;letter-spacing:.02em;box-shadow:var(--glow-pink);}
  .buy-btn:active{transform:scale(.98);opacity:.92;}
  .mini-btn{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;padding:14px;border-radius:14px;font-family:inherit;font-size:13.5px;font-weight:600;text-decoration:none;cursor:pointer;transition:transform .15s,border-color .2s;background:linear-gradient(135deg,#0a1018,#0f1726);border:1px solid rgba(18,194,233,.3);color:var(--cyan);margin-bottom:14px;}
  .mini-btn:active{transform:scale(.98);}

  .cert-note{background:var(--bg-card2);border:1px solid rgba(232,201,125,.22);border-radius:16px;padding:15px 17px;display:flex;gap:12px;align-items:flex-start;}
  .cert-note .em{font-size:22px;line-height:1.1;}
  .cert-note b{display:block;font-size:13px;color:var(--gold);font-weight:700;margin-bottom:3px;letter-spacing:.02em;}
  .cert-note p{font-size:12.5px;color:#7d7da0;line-height:1.5;}

  /* CATEGORY SCREEN */
  .cat-header{padding:30px 20px 18px;border-bottom:1px solid #0f0f1e;position:sticky;top:0;background:var(--bg-base);z-index:10;}
  .back-btn{background:#0f0f1a;border:1px solid var(--bg-border);color:#7a7aa0;border-radius:10px;padding:7px 14px;font-size:13px;cursor:pointer;margin-bottom:18px;font-family:inherit;transition:color .2s;display:inline-flex;align-items:center;gap:6px;}
  .back-btn:active{color:#cacae8;}
  .cat-info{display:flex;align-items:center;gap:14px;}
  .cat-icon{width:52px;height:52px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:25px;flex-shrink:0;}
  .cat-name{font-family:'Bebas Neue',sans-serif;font-size:29px;letter-spacing:.03em;color:#fff;line-height:1;}
  .cat-subtitle{font-size:12px;color:#55557a;margin-top:4px;}
  .topics{padding:14px 20px 44px;}
  .topic-item{display:flex;align-items:center;gap:13px;background:var(--bg-card);border:1px solid #161626;border-radius:14px;padding:13px 15px;margin-bottom:8px;text-decoration:none;transition:border-color .2s,transform .15s;-webkit-tap-highlight-color:transparent;}
  .topic-item:active{transform:scale(.985);}
  .topic-em{font-size:19px;flex-shrink:0;width:24px;text-align:center;}
  .topic-body{flex:1;min-width:0;}
  .topic-title{font-size:13.5px;font-weight:600;color:#d4d4f0;line-height:1.3;}
  .topic-desc{font-size:11.5px;color:#50506e;margin-top:2px;}
  .topic-arrow{color:#26263f;font-size:17px;flex-shrink:0;}
  .badge-new{font-size:8px;letter-spacing:.1em;font-weight:800;color:#fff;background:var(--grad-main);border-radius:5px;padding:2px 5px;margin-left:7px;vertical-align:middle;}
  .soon-banner{background:var(--bg-card2);border:1px dashed #2a2a44;border-radius:14px;padding:18px;text-align:center;color:#62628a;font-size:13px;line-height:1.5;margin-top:8px;}
  .soon-banner b{color:#9a9ac0;}

  /* SEARCH RESULTS */
  .sr-label{padding:18px 20px 6px;font-size:12px;color:#55557a;letter-spacing:.04em;}
  .sr-cat{font-size:10px;color:var(--cyan);letter-spacing:.05em;text-transform:uppercase;margin-top:3px;}
  .empty{padding:50px 30px;text-align:center;color:#55557a;}
  .empty .em{font-size:34px;display:block;margin-bottom:12px;opacity:.6;}
  .empty p{font-size:14px;line-height:1.5;}
</style>
</head>

const catById = id => categories.find(c=>c.id===id);

function setAmbient(cat){
  const a=document.getElementById("ambient");
  a.style.background = cat
    ? `radial-gradient(ellipse, ${cat.glow}22 0%, transparent 70%)`
    : "radial-gradient(ellipse, rgba(240,147,251,0.13) 0%, transparent 70%)";
}

function topicRow(t){
  return `<a class="topic-item" href="${t.url}" target="_blank" rel="noopener">
    <span class="topic-em">${t.emoji}</span>
    <div class="topic-body">
      <div class="topic-title">${esc(t.title)}${t.new?'<span class="badge-new">NEW</span>':''}</div>
      <div class="topic-desc">${esc(t.desc)}</div>
    </div>
    <span class="topic-arrow">›</span>
  </a>`;
}

function catCard(cat){
  return `<button class="cat-card" onclick="openCat('${cat.id}')">
    <span class="cat-shine" style="background:${cat.bg}"></span>
    <span class="cat-emoji">${cat.emoji}</span>
    <div class="cat-title">${esc(cat.title)}</div>
    <div class="cat-sub">${esc(cat.subtitle)}</div>
    <div class="cat-foot">
      <span class="cat-count">${cat.topics.length} тем</span>
      ${cat.soon?'<span class="cat-dot"></span><span class="cat-soon">скоро ещё</span>':''}

  </button>`;
}

function renderCat(cat){
  setAmbient(cat);
  root().innerHTML = `
  <div class="screen">
    <div class="cat-header">
      <button class="back-btn" onclick="goHome()">← Назад</button>
      <div class="cat-info">
        <div class="cat-icon" style="background:${cat.bg};box-shadow:0 0 22px ${cat.glow}33">${cat.emoji}</div>
        <div><div class="cat-name">${esc(cat.title)}</div><div class="cat-subtitle">${esc(cat.subtitle)}</div></div>
      </div>
    </div>
    <div class="topics">
      ${cat.topics.map(topicRow).join("")}
      ${cat.soon?`<div class="soon-banner">⏳ <b>${esc(cat.soon)}</b></div>`:''}
    </div>
  </div>`;
}

/* поиск по всем темам */
function allTopics(){
  const out=[];
  categories.forEach(c=>c.topics.forEach(t=>out.push({...t,cat:c.title,catEmoji:c.emoji})));
  return out;
}
function renderSearch(){
  const box=document.getElementById("searchResults");
  const body=document.getElementById("homeBody");
  if(!query.trim()){ box.innerHTML=""; if(body) body.style.display=""; return; }
  if(body) body.style.display="none";
  const q=query.toLowerCase();
  const res=allTopics().filter(t=>(t.title+" "+t.desc+" "+t.cat).toLowerCase().includes(q));
  if(!res.length){
    box.innerHTML=`<div class="empty"><span class="em">🤔</span><p>Ничего не нашлось по «${esc(query)}».<br>Попробуй другое слово.</p></div>`;
    return;
  }
  box.innerHTML=`<div class="sr-label">Найдено: ${res.length}</div><div class="topics" style="padding-top:4px">${
    res.map(t=>`<a class="topic-item" href="${t.url}" target="_blank" rel="noopener">
      <span class="topic-em">${t.emoji}</span>
      <div class="topic-body">
        <div class="topic-title">${esc(t.title)}</div>
        <div class="sr-cat">${t.catEmoji} ${esc(t.cat)}</div>
      </div>
      <span class="topic-arrow">›</span>
    </a>`).join("")
  }</div>`;
}

function onSearch(v){
  query=v;
  document.getElementById("searchClear").style.display=v?"block":"none";
  renderSearch();
}
function clearSearch(){
  query="";
  const inp=document.getElementById("search");
  if(inp) inp.value="";
  document.getElementById("searchClear").style.display="none";
  renderSearch();
}
function openCat(id){ activeCatId=id; screen="category"; query=""; renderCat(catById(id)); window.scrollTo(0,0); }
function goHome(){ screen="home"; renderHome(); window.scrollTo(0,0); }

renderHome();
